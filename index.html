<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHouses - Choose Your Character</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>MYHOUSES</h1>
            <p class="subtitle">Choose your character to begin</p>
        </header>
        
        <div class="character-select">
            <div class="character-card" data-character="engineer" data-name="Engineer">
                <div class="card-image">
                    <img src="engineer.jpg" alt="Engineer">
                </div>
                <div class="card-name">Engineer</div>
            </div>
            
            <div class="character-card" data-character="hipster" data-name="Hipster">
                <div class="card-image">
                    <img src="hipster.jpg" alt="Hipster">
                </div>
                <div class="card-name">Hipster</div>
            </div>
            
            <div class="character-card" data-character="shadow" data-name="Shadow">
                <div class="card-image">
                    <img src="shadow.jpg" alt="Shadow">
                </div>
                <div class="card-name">Shadow</div>
            </div>
            
            <div class="character-card" data-character="speedster" data-name="Speedster">
                <div class="card-image">
                    <img src="speedster.jpg" alt="Speedster">
                </div>
                <div class="card-name">Speedster</div>
            </div>
        </div>
        
        <div class="selected-info" id="selected-info">
            <p>Click a character to select</p>
        </div>
        
        <button id="start-game" class="start-btn" disabled>START GAME</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
