<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHouses - Choose Your Character</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="selection-screen">
        <h1 class="title">Choose Your Character</h1>
        <p class="subtitle">Select a hero to begin your adventure</p>
        
        <div class="characters-container">
            <div class="character-card" data-character="engineer">
                <img src="engineer.jpg" alt="Engineer" class="character-image">
                <h3 class="character-name">Engineer</h3>
                <p class="character-description">Master of technology and gadgets</p>
            </div>
            
            <div class="character-card" data-character="hipster">
                <img src="hipster.jpg" alt="Hipster" class="character-image">
                <h3 class="character-name">Hipster</h3>
                <p class="character-description">Style and music enthusiast</p>
            </div>
            
            <div class="character-card" data-character="shadow">
                <img src="shadow.jpg" alt="Shadow" class="character-image">
                <h3 class="character-name">Shadow</h3>
                <p class="character-description">Silent assassin and spy</p>
            </div>
            
            <div class="character-card" data-character="speedster">
                <img src="speedster.jpg" alt="Speedster" class="character-image">
                <h3 class="character-name">Speedster</h3>
                <p class="character-description">Blazing fast and agile fighter</p>
            </div>
        </div>
        
        <button id="start-btn" class="start-button" disabled>Start Game</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
