<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHouses - Choose Your Character</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="selection-screen">
        <h1 class="title">Choose Your Character</h1>
        <p class="subtitle">Select a hero to begin your adventure</p>
        
        <div class="characters-container">
            <div class="character-card" data-character="alien-emblem">
                <img src="Alien Creature Emblem Against Celestial Background With Glowing Effects.png" alt="Alien Emblem Character" class="character-image">
                <h3 class="character-name">Alien Commander</h3>
                <p class="character-description">Mastery of cosmic energy and tactical warfare</p>
            </div>
            
            <div class="character-card" data-character="character-1">
                <img src="gemini-2.5-flash-image_generate_a_character_using_the_photo_make_it_cool_and_with_a_full_body-0.jpg" alt="Character 1" class="character-image">
                <h3 class="character-name">Cyber Warrior</h3>
                <p class="character-description">High-tech combat specialist</p>
            </div>
            
            <div class="character-card" data-character="character-2">
                <img src="gemini-2.5-flash-image_generate_a_character_using_the_photo_make_it_cool_and_with_a_full_body-0 (1).jpg" alt="Character 2" class="character-image">
                <h3 class="character-name">Shadow Rogue</h3>
                <p class="character-description">Stealth and precision attacks</p>
            </div>
            
            <div class="character-card" data-character="character-3">
                <img src="gemini-2.5-flash-image_generate_a_character_using_the_photo_make_it_cool_and_with_a_full_body-0 (2).jpg" alt="Character 3" class="character-image">
                <h3 class="character-name">Mystic Mage</h3>
                <p class="character-description">Arcane magic and elemental powers</p>
            </div>
        </div>
        
        <button id="start-btn" class="start-button" disabled>Start Game</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
