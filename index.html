<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHouses - Chat Character Selection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>MyHouses Game</h1>
            <p>Select your character by chatting with them</p>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message system">
                <div class="message-content">Welcome to MyHouses! Which hero would you like to play as? Click on a character to chat with them.</div>
            </div>
        </div>
        
        <div class="characters-chat">
            <div class="character-option" data-character="engineer" data-name="Engineer">
                <img src="engineer.jpg" alt="Engineer" class="character-avatar">
                <span class="character-label">Engineer</span>
            </div>
            
            <div class="character-option" data-character="hipster" data-name="Hipster">
                <img src="hipster.jpg" alt="Hipster" class="character-avatar">
                <span class="character-label">Hipster</span>
            </div>
            
            <div class="character-option" data-character="shadow" data-name="Shadow">
                <img src="shadow.jpg" alt="Shadow" class="character-avatar">
                <span class="character-label">Shadow</span>
            </div>
            
            <div class="character-option" data-character="speedster" data-name="Speedster">
                <img src="speedster.jpg" alt="Speedster" class="character-avatar">
                <span class="character-label">Speedster</span>
            </div>
        </div>
        
        <button id="start-btn" class="start-button" disabled>Start Game with Selected Character</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
